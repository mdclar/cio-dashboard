<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>30-Day Calendar — CIO Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f4ef;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-faint: #8a8a8a;
    --rule: #d9d4c8;
    --rule-soft: #ebe7dc;
    --paper: #fdfcf8;
    --accent: #8b3a2f;
    --earnings: #8a5a2a;
    --earnings-held: #6a3a1a;
    --economic: #3a5a3a;
    --dividend: #3a5a6a;
    --today-bg: #faf3df;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 56px clamp(20px, 4vw, 48px); }
  .masthead {
    border-top: 3px solid var(--ink);
    border-bottom: 1px solid var(--rule);
    padding: 24px 0 18px;
    margin-bottom: 36px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .masthead h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: clamp(28px, 4vw, 40px);
    letter-spacing: -0.02em;
  }
  .back-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
  }
  .back-link:hover { color: var(--accent); }
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 36px;
  }
  .summary-stat {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 14px 16px;
  }
  .summary-stat .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 4px;
  }
  .summary-stat .value {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 24px;
    font-weight: 600;
  }
  .legend {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    margin-bottom: 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
  }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; }
  .swatch.earnings  { background: var(--earnings); }
  .swatch.held      { background: var(--earnings-held); }
  .swatch.economic  { background: var(--economic); }
  .swatch.dividend  { background: var(--dividend); }
  .day-row {
    display: grid;
    grid-template-columns: 180px 1fr;
    border-bottom: 1px solid var(--rule);
    padding: 14px 0;
  }
  .day-row.today { background: var(--today-bg); margin: 0 -16px; padding: 14px 16px; }
  .day-row.weekend { opacity: 0.55; }
  .day-row.empty .events::before { content: '—'; color: var(--ink-faint); }
  .day-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .day-meta .date {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    display: block;
    margin-bottom: 2px;
  }
  .day-row.today .day-meta .date { color: var(--accent); }
  .day-meta .today-tag {
    display: inline-block;
    margin-top: 4px;
    padding: 2px 8px;
    background: var(--accent);
    color: var(--bg);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .events { display: flex; flex-direction: column; gap: 6px; }
  .event {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 4px 0;
    font-size: 13.5px;
  }
  .event .ticker {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    min-width: 60px;
    color: var(--earnings);
  }
  .event.held .ticker { color: var(--earnings-held); font-weight: 600; }
  .event-name { color: var(--ink); }
  .event.economic .event-name { color: var(--economic); font-weight: 500; }
  .event.dividend .ticker { color: var(--dividend); }
  .event .annotation { color: var(--ink-faint); font-size: 12px; margin-left: 8px; }
  .loading, .empty-state {
    color: var(--ink-faint);
    font-style: italic;
    padding: 40px 0;
    text-align: center;
  }
  .error-msg { color: #9a3525; padding: 20px 0; }
  footer {
    margin-top: 48px;
    padding-top: 18px;
    border-top: 1px solid var(--rule);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
<link rel="stylesheet" href="/assets/cio_chat.css">
<script src="/assets/cio_chat.js" defer></script>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <h1>30-Day Calendar</h1>
    <a class="back-link" href="/cio_dashboard.html">← BACK TO BRIEF</a>
  </div>
  <div class="legend">
    <span><i class="swatch held"></i>Held position earnings</span>
    <span><i class="swatch earnings"></i>Watchlist earnings</span>
    <span><i class="swatch economic"></i>Economic event</span>
    <span><i class="swatch dividend"></i>Dividend ex-date</span>
  </div>
  <div class="summary-bar" id="summary"></div>
  <div id="content" class="loading">Loading 30-day calendar…</div>
  <footer><span id="meta">—</span></footer>
</div>
<script>
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
(async function() {
  const contentEl = document.getElementById('content');
  const summaryEl = document.getElementById('summary');
  const metaEl = document.getElementById('meta');
  try {
    const res = await fetch('/.netlify/functions/get_calendar', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.empty || !Array.isArray(data.days) || !data.days.length) {
      contentEl.classList.remove('loading');
      contentEl.classList.add('empty-state');
      contentEl.textContent = data.message || 'No calendar data yet.';
      return;
    }
    const s = data.summary || {};
    const stats = [
      ['Window', `${data.window?.start || '—'} → ${data.window?.end || '—'}`],
      ['Total Events', s.total_events ?? 0],
      ['Earnings', s.earnings_count ?? 0],
      ['Economic', s.economic_count ?? 0],
      ['Dividends', s.dividend_count ?? 0]
    ];
    summaryEl.innerHTML = stats.map(([k, v]) =>
      `<div class="summary-stat"><div class="label">${escapeHtml(k)}</div><div class="value">${escapeHtml(v)}</div></div>`
    ).join('');
    contentEl.classList.remove('loading');
    contentEl.innerHTML = data.days.map(day => {
      const dateObj = new Date(day.date + 'T12:00:00Z');
      const dow = dateObj.getUTCDay();
      const isWeekend = (dow === 0 || dow === 6);
      const dayNum = dateObj.getUTCDate();
      const events = (day.events || []).map(ev => {
        const cls = `event ${escapeHtml(ev.type || '')} ${ev.held ? 'held' : ''}`;
        if (ev.type === 'earnings') {
          const annot = ev.annotation ? `<span class="annotation">${escapeHtml(ev.annotation)}</span>` : '';
          return `<div class="${cls}"><span class="ticker">${escapeHtml(ev.ticker)}</span><span class="event-name">${escapeHtml(ev.name)}</span>${annot}</div>`;
        }
        if (ev.type === 'dividend') {
          const annot = ev.annotation ? `<span class="annotation">${escapeHtml(ev.annotation)}</span>` : '';
          return `<div class="${cls}"><span class="ticker">${escapeHtml(ev.ticker)}</span><span class="event-name">${escapeHtml(ev.name)}</span>${annot}</div>`;
        }
        return `<div class="${cls}"><span class="ticker"></span><span class="event-name">${escapeHtml(ev.name)}</span></div>`;
      }).join('');
      const rowClasses = ['day-row'];
      if (day.is_today) rowClasses.push('today');
      if (isWeekend) rowClasses.push('weekend');
      if (!events) rowClasses.push('empty');
      return `
        <div class="${rowClasses.join(' ')}">
          <div class="day-meta">
            <span class="date">${dayNum}</span>
            <span>${escapeHtml(day.label)}</span>
            ${day.is_today ? '<div class="today-tag">Today</div>' : ''}
          </div>
          <div class="events">${events}</div>
        </div>
      `;
    }).join('');
    metaEl.textContent = data.saved_at
      ? `Saved ${new Date(data.saved_at).toLocaleString()} · ${data.total_days || data.days.length} days · Calendar Agent`
      : 'Calendar Agent';
  } catch (e) {
    contentEl.classList.remove('loading');
    contentEl.innerHTML = `<div class="error-msg">Calendar load failed: ${escapeHtml(e.message)}</div>`;
  }
})();
</script>
</body>
</html>
