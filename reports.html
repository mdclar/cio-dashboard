<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports Library · CIO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f4ef; --paper:#fffdf9; --ink:#241f1c; --accent:#8b3a2f;
    --line:#e5e0d6; --muted:#6d6559; --pin:#b9852a;
    --long:#2f6f4f; --long-bg:#e8f1ea; --cut:#a23b2c; --cut-bg:#f6e9e6; --chip-bg:#f6edd9;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'IBM Plex Sans',-apple-system,sans-serif;font-size:15px;line-height:1.55}
  .wrap{max-width:920px;margin:0 auto;padding:0 20px 80px}
  a{color:var(--accent);text-decoration:none}
  header{padding:34px 0 22px;border-bottom:1px solid var(--line);margin-bottom:26px}
  .back{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:.04em}
  .back:hover{color:var(--accent)}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:34px;margin:12px 0 4px;letter-spacing:-.01em}
  .tag-line{color:var(--muted);font-size:14px}
  .sec-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted);margin:30px 0 10px}

  /* Pinned quarterly card */
  .pin{background:var(--paper);border:1px solid var(--line);border-top:4px solid var(--pin);
    border-radius:10px;padding:22px 24px;box-shadow:0 3px 16px rgba(36,31,28,.05)}
  .pin .flag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;color:var(--pin);background:var(--chip-bg);
    padding:3px 9px;border-radius:4px;margin-bottom:10px}
  .pin h2{font-family:'Fraunces',serif;font-weight:600;font-size:23px;margin:0 0 4px}
  .pin .summary{color:var(--muted);margin:0 0 14px}
  .pin .date{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted)}
  .actions{margin:14px 0 4px;border-top:1px solid var(--line);padding-top:14px}
  .actions h3{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);margin:0 0 10px}
  .act{display:flex;gap:10px;align-items:baseline;padding:7px 0;border-bottom:1px dashed var(--line)}
  .act:last-child{border-bottom:none}
  .act .tk{font-family:'IBM Plex Mono',monospace;font-weight:600;min-width:58px}
  .act .badge{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap}
  .b-long{background:var(--long-bg);color:var(--long)} .b-cut{background:var(--cut-bg);color:var(--cut)}
  .b-chip{background:var(--chip-bg);color:var(--pin)} .b-hold{background:#eceae4;color:var(--muted)}
  .act .note{color:var(--muted);font-size:13.5px}
  .openbtn{display:inline-block;margin-top:16px;font-family:'IBM Plex Mono',monospace;font-size:12px;
    font-weight:600;letter-spacing:.04em;background:var(--ink);color:var(--bg);padding:9px 16px;border-radius:6px}
  .openbtn:hover{background:var(--accent);color:#fff}

  /* List */
  .card{display:flex;justify-content:space-between;align-items:center;gap:16px;background:var(--paper);
    border:1px solid var(--line);border-radius:8px;padding:15px 18px;margin:10px 0;transition:.15s}
  .card:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(36,31,28,.06);border-color:#d8d2c6}
  .card .t{font-family:'Fraunces',serif;font-weight:600;font-size:16px;margin:0}
  .card .m{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px}
  .card .s{color:var(--muted);font-size:13px;margin-top:4px;max-width:60ch}
  .type{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.05em;
    text-transform:uppercase;padding:3px 8px;border-radius:4px;background:var(--chip-bg);color:var(--pin)}
  .type.weekly{background:#e8eef4;color:#3a5c7d} .type.thesis{background:var(--long-bg);color:var(--long)}
  .empty{background:var(--paper);border:1px dashed var(--line);border-radius:8px;padding:30px;text-align:center;color:var(--muted)}
  .foot{margin-top:40px;color:var(--muted);font-size:12px}

  .runbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 22px;
    background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .runbar-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--muted);margin-right:4px}
  .runbtn{font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;
    border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 14px;border-radius:8px;transition:all .12s}
  .runbtn:hover{border-color:var(--accent);color:var(--accent)}
  .runbtn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .runbtn.primary:hover{background:#7a3227;color:#fff}
  .runbtn:disabled{opacity:.5;cursor:default}
  .toast{display:none;margin:0 0 20px;padding:11px 15px;border-radius:9px;font-size:13.5px;
    background:#eef4ee;border:1px solid #cfe0d2;color:#2f6f4f}
  .toast.show{display:block}
  .toast .cd{font-family:'IBM Plex Mono',monospace;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a class="back" href="/cio_dashboard.html">← CIO Dashboard</a>
    <h1>Reports Library</h1>
    <div class="tag-line">Every CIO report, kept in one place. The pinned report and its recommended actions stay at the top.</div>
  </header>

  <div class="runbar">
    <span class="runbar-label">↻ Refresh reports</span>
    <button class="runbtn" onclick="runReport('run-rebalance','Rebalance')">Rebalance</button>
    <button class="runbtn" onclick="runReport('run-rotation','Rotation')">Rotation</button>
    <button class="runbtn primary" onclick="runAll()">Refresh All</button>
  </div>
  <div id="toast" class="toast"></div>

  <div id="pinned"></div>
  <div class="sec-label" id="alllabel" style="display:none">All reports</div>
  <div id="list"></div>

  <div class="foot" id="foot"></div>
</div>

<script>
const FN = '/.netlify/functions/get_reports';

// ---- Manual report triggers (fire the n8n webhooks on Beast over Tailscale) ----
// If your n8n host/address changes, edit N8N_BASE below.
const N8N_BASE = 'http://beast.tail53158a.ts.net:5678';
let _reloadTimer = null;
function showToast(msg){ const t=document.getElementById('toast'); t.innerHTML=msg; t.classList.add('show'); }
function runReport(path, label){
  // Top-level popup navigation avoids browser mixed-content blocking of the HTTP webhook.
  window.open(N8N_BASE + '/webhook/' + path, 'n8nrun', 'width=440,height=320');
  let secs = 35;
  showToast('⚙️ Running the <b>'+label+'</b> report… the library will refresh in <span class="cd" id="cd">'+secs+'s</span>. (You can close the little popup window.)');
  clearInterval(_reloadTimer);
  _reloadTimer = setInterval(()=>{ secs--; const cd=document.getElementById('cd'); if(cd) cd.textContent=secs+'s';
    if(secs<=0){ clearInterval(_reloadTimer); location.reload(); } }, 1000);
}
function runAll(){
  window.open(N8N_BASE + '/webhook/run-rebalance', 'n8nrun1', 'width=440,height=320');
  setTimeout(()=>window.open(N8N_BASE + '/webhook/run-rotation', 'n8nrun2', 'width=440,height=320'), 1200);
  let secs = 40;
  showToast('⚙️ Running <b>both</b> reports… the library will refresh in <span class="cd" id="cd">'+secs+'s</span>. (You can close the popup windows.)');
  clearInterval(_reloadTimer);
  _reloadTimer = setInterval(()=>{ secs--; const cd=document.getElementById('cd'); if(cd) cd.textContent=secs+'s';
    if(secs<=0){ clearInterval(_reloadTimer); location.reload(); } }, 1000);
}

function badgeClass(action){
  const a = (action||'').toLowerCase();
  if (a.includes('buy') || a.includes('hold') && a.includes('add') || a.includes('keep') || a.includes('add')) return 'b-long';
  if (a.includes('exit') || a.includes('cut') || a.includes('reduce') || a.includes('sell') || a.includes('draw')) return 'b-cut';
  if (a.includes('trim') || a.includes('take') || a.includes('basis') || a.includes('gift')) return 'b-chip';
  return 'b-hold';
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderActions(actions){
  if (!actions || !actions.length) return '';
  const rows = actions.map(a => `
    <div class="act">
      <span class="tk">${esc(a.ticker||'')}</span>
      <span class="badge ${badgeClass(a.action)}">${esc(a.action||'')}</span>
      <span class="note">${esc(a.note||'')}</span>
    </div>`).join('');
  return `<div class="actions"><h3>Recommended actions</h3>${rows}</div>`;
}

function renderPinned(r){
  return `<div class="pin">
    <span class="flag">${esc(r.type==='quarterly'?'Quarterly research':'Pinned')} · ${esc(r.date)}</span>
    <h2>${esc(r.title)}</h2>
    <p class="summary">${esc(r.summary||'')}</p>
    ${renderActions(r.actions)}
    ${r.url ? `<a class="openbtn" href="${esc(r.url)}">Open full report →</a>` : ''}
  </div>`;
}

function renderCard(r){
  return `<a class="card" href="${esc(r.url||('#'+r.id))}">
    <div>
      <p class="t">${esc(r.title)}</p>
      <div class="m">${esc(r.date)}${r.action_count?` · ${r.action_count} actions`:''}</div>
      ${r.summary?`<div class="s">${esc(r.summary)}</div>`:''}
    </div>
    <span class="type ${esc(r.type||'weekly')}">${esc(r.type||'weekly')}</span>
  </a>`;
}

(async function(){
  try{
    const res = await fetch(FN, { cache:'no-store' });
    const data = await res.json();
    const reports = (data && data.reports) || [];
    if (!reports.length){
      document.getElementById('list').innerHTML =
        '<div class="empty">No reports published yet. Push one with <code>save_report</code> and it appears here.</div>';
      return;
    }
    // Pin: explicit pinned flag first, else newest quarterly, else nothing pinned.
    let pin = reports.find(r => r.pinned) || reports.find(r => r.type === 'quarterly') || null;
    if (pin){
      // fetch full record (with actions) for the pinned one
      try{
        const full = await (await fetch(FN + '?id=' + encodeURIComponent(pin.id), {cache:'no-store'})).json();
        if (full && !full.error) pin = full;
      }catch(e){}
      document.getElementById('pinned').innerHTML = renderPinned(pin);
    }
    const rest = reports.filter(r => !(pin && r.id === pin.id));
    if (rest.length){
      document.getElementById('alllabel').style.display = 'block';
      document.getElementById('list').innerHTML = rest.map(renderCard).join('');
    }
    document.getElementById('foot').textContent = reports.length + ' report' + (reports.length===1?'':'s') + ' · newest first';
  }catch(e){
    document.getElementById('list').innerHTML = '<div class="empty">Could not load reports: '+esc(e.message)+'</div>';
  }
})();
</script>
</body>
</html>
