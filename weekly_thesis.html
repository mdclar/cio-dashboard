<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weekly Thesis — CIO Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f4ef;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-faint: #8a8a8a;
    --rule: #d9d4c8;
    --rule-soft: #ebe7dc;
    --paper: #fdfcf8;
    --accent: #8b3a2f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14.5px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 56px clamp(20px, 4vw, 48px); }
  .masthead {
    border-top: 3px solid var(--ink);
    border-bottom: 1px solid var(--rule);
    padding: 24px 0 18px;
    margin-bottom: 36px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .masthead h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: clamp(28px, 4vw, 40px);
    letter-spacing: -0.02em;
  }
  .back-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
  }
  .back-link:hover { color: var(--accent); }
  .doc-card {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 32px;
    margin-bottom: 28px;
    text-align: center;
  }
  .doc-card .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 14px;
  }
  .doc-card .gen-time {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .doc-card .gen-detail {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 22px;
  }
  .doc-button {
    display: inline-block;
    background: var(--accent);
    color: var(--bg) !important;
    padding: 14px 32px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    border: none;
    cursor: pointer;
    transition: background 0.15s;
  }
  .doc-button:hover {
    background: #7a3128;
    text-decoration: none !important;
  }
  .doc-button:before {
    content: '↗ ';
    margin-right: 4px;
  }
  .pane {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 28px 32px;
    margin-bottom: 28px;
  }
  .pane h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }
  .content h3 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 20px;
    margin: 18px 0 10px;
    color: var(--ink);
  }
  .content h4 {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    margin: 14px 0 6px;
    color: var(--ink-soft);
  }
  .content p { margin: 8px 0; }
  .content ul { padding-left: 22px; margin: 8px 0; }
  .content li { padding: 3px 0; }
  .content strong { color: var(--accent); font-weight: 600; }
  .loading, .empty-state {
    color: var(--ink-faint);
    font-style: italic;
    padding: 40px 0;
    text-align: center;
  }
  .error-msg { color: #9a3525; padding: 20px 0; }
  pre.json {
    background: #1f1d1a;
    color: #e8e4d8;
    padding: 16px 20px;
    overflow-x: auto;
    font-size: 12px;
    line-height: 1.5;
    font-family: 'IBM Plex Mono', monospace;
  }
  footer {
    margin-top: 48px;
    padding-top: 18px;
    border-top: 1px solid var(--rule);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
<link rel="stylesheet" href="/assets/cio_chat.css">
<script src="/assets/cio_chat.js" defer></script>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <h1>Weekly Thesis</h1>
    <a class="back-link" href="/cio_dashboard.html">← BACK TO BRIEF</a>
  </div>
  <div id="content" class="loading">Loading weekly thesis…</div>
  <footer><span id="meta">—</span></footer>
</div>
<script>
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
(async function() {
  const contentEl = document.getElementById('content');
  const metaEl = document.getElementById('meta');
  try {
    const res = await fetch('/.netlify/functions/get_weekly_thesis', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.empty) {
      contentEl.classList.remove('loading');
      contentEl.classList.add('empty-state');
      contentEl.textContent = data.message || 'No weekly thesis published yet.';
      return;
    }
    contentEl.classList.remove('loading');

    const docUrl = data.doc_url || (data.metadata && data.metadata.doc_url) || null;
    const genLabel = data.generatedLabel
      || (data.metadata && data.metadata.generated_label)
      || null;
    const tickerCount = data.tickerCount
      || (data.metadata && data.metadata.ticker_count)
      || null;

    let html = '';

    // Top card: doc link + timestamp
    if (docUrl) {
      html += '<div class="doc-card">';
      html += '<div class="label">Latest Weekly Thesis</div>';
      if (genLabel) {
        html += `<div class="gen-time">${escapeHtml(genLabel)}</div>`;
      }
      const detailParts = [];
      if (tickerCount) detailParts.push(`${tickerCount} tickers analyzed`);
      if (data.saved_at) detailParts.push(`saved ${new Date(data.saved_at).toLocaleString()}`);
      if (detailParts.length) {
        html += `<div class="gen-detail">${escapeHtml(detailParts.join(' · '))}</div>`;
      }
      html += `<a class="doc-button" href="${escapeHtml(docUrl)}" target="_blank" rel="noopener">Open Full Thesis Document</a>`;
      html += '</div>';
    } else {
      html += '<div class="doc-card">';
      html += '<div class="label">Weekly Thesis</div>';
      html += '<div class="gen-detail">Document link not available — check Google Drive directly</div>';
      html += '</div>';
    }

    contentEl.innerHTML = html;

    const meta = [];
    if (data.saved_at) meta.push('Saved ' + new Date(data.saved_at).toLocaleString());
    if (data.generatedDate) meta.push('Generated ' + data.generatedDate);
    metaEl.textContent = meta.join(' · ') || '—';
  } catch (e) {
    contentEl.classList.remove('loading');
    contentEl.innerHTML = `<div class="error-msg">Weekly thesis load failed: ${escapeHtml(e.message)}</div>`;
  }
})();
</script>
</body>
</html>
